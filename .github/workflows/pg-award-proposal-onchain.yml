name: PG Award Proposal - Tansu

on:
  pull_request:
    types: [closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged proposal pull request number to submit on-chain
        required: true
        type: string
      project_key:
        description: Optional Tansu project key override (hex-encoded bytes)
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

jobs:
  submit:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    environment: proposal-tansu
    env:
      FILEBASE_IPFS_API_KEY: ${{ secrets.FILEBASE_IPFS_API_KEY }}
      STELLAR_SOURCE_SECRET: ${{ secrets.STELLAR_SOURCE_SECRET }}
      STELLAR_NETWORK_PASSPHRASE: ${{ secrets.STELLAR_NETWORK_PASSPHRASE }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      STELLAR_NETWORK_NAME: ${{ vars.STELLAR_NETWORK_NAME || 'testnet' }}
      STELLAR_RPC_URL: ${{ vars.STELLAR_RPC_URL }}
      TANSU_CONTRACT_ID: ${{ vars.TANSU_CONTRACT_ID }}
      TANSU_PROJECT_KEY: ${{ vars.TANSU_PROJECT_KEY }}
    steps:
      - name: Resolve proposal metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_FROM_EVENT: ${{ github.event.pull_request.number }}
          PR_NUMBER_FROM_INPUT: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail

          PR_NUMBER="${PR_NUMBER_FROM_EVENT:-}"
          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            PR_NUMBER="${PR_NUMBER_FROM_INPUT:-}"
          fi

          PR_JSON="$(gh pr view \
            "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json title,labels,files)"

          HAS_LABEL="$(jq -r 'any(.labels[]?; .name == "pg-award-proposal")' <<<"${PR_JSON}")"
          mapfile -t PROJECT_FILES < <(
            jq -r \
              '.files[].path | select(startswith("docs/projects/") and endswith(".md") and (endswith("/index.md") | not))' \
              <<<"${PR_JSON}"
          )
          PROJECT_COUNT="${#PROJECT_FILES[@]}"

          {
            echo "pr_number=${PR_NUMBER}"
            echo "checkout_ref=refs/pull/${PR_NUMBER}/head"
          } >> "${GITHUB_OUTPUT}"

          if [[ "${HAS_LABEL}" != "true" && "${PROJECT_COUNT}" -ne 1 ]]; then
            echo "eligible=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${PROJECT_COUNT}" -eq 0 ]]; then
            echo "::error::Proposal PR #${PR_NUMBER} did not include a docs/projects/*.md file"
            exit 1
          fi

          if [[ "${PROJECT_COUNT}" -gt 1 ]]; then
            echo "::error::Proposal PR #${PR_NUMBER} modified multiple docs/projects/*.md files"
            exit 1
          fi

          {
            echo "eligible=true"
            echo "proposal_file=${PROJECT_FILES[0]}"
            echo "proposal_title<<EOF"
            jq -r '.title' <<<"${PR_JSON}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Skip non-proposal merge
        if: steps.meta.outputs.eligible != 'true'
        run: echo "::notice::Merged PR is not a proposal PR - skipping."

      - name: Checkout PR head revision
        if: steps.meta.outputs.eligible == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}

      - name: Upload proposal markdown to Filebase
        if: steps.meta.outputs.eligible == 'true'
        id: proposal
        env:
          PROPOSAL_FILE: ${{ steps.meta.outputs.proposal_file }}
          PROPOSAL_TITLE: ${{ steps.meta.outputs.proposal_title }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
        run: |
          set -euo pipefail

          NORMALIZED_TITLE="$(printf '%s' "${PROPOSAL_TITLE}" | sed 's/^PG Award Proposal: //')"
          NORMALIZED_TITLE="$(printf '%s' "${NORMALIZED_TITLE}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"

          OUTCOMES_FILE="${RUNNER_TEMP}/outcomes.json"
          printf '%s\n' \
            '{"approved":{"description":"Fund the proposal"},"rejected":{"description":"Do not fund the proposal"},"cancelled":{"description":"Undecided outcome"}}' \
            > "${OUTCOMES_FILE}"

          DISCUSSION_FILE="${RUNNER_TEMP}/proposal_discussion.md"
          gh pr view "${PR_NUMBER}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json body | jq -r '.body' > "${DISCUSSION_FILE}"

          FILEBASE_RESPONSE="$(
            curl --silent --show-error --fail \
              -X POST \
              -H "Authorization: Bearer ${FILEBASE_IPFS_API_KEY}" \
              "https://rpc.filebase.io/api/v0/add?wrap-with-directory=true" \
              -F "file=@${PROPOSAL_FILE};filename=proposal.md;type=text/markdown" \
              -F "file=@${OUTCOMES_FILE};filename=outcomes.json;type=application/json" \
              -F "file=@${DISCUSSION_FILE};filename=proposal_discussion.md;type=text/markdown"
          )"

          CID="$(printf '%s\n' "${FILEBASE_RESPONSE}" | jq -r '.Hash // .Cid // empty' | tail -n 1)"
          curl --silent --show-error --fail --location \
            "https://ipfs.filebase.io/ipfs/${CID}/proposal.md" \
            --output /dev/null
          curl --silent --show-error --fail --location \
            "https://ipfs.filebase.io/ipfs/${CID}/outcomes.json" \
            --output /dev/null
          curl --silent --show-error --fail --location \
            "https://ipfs.filebase.io/ipfs/${CID}/proposal_discussion.md" \
            --output /dev/null
          VOTING_ENDS_AT="$(( $(date +%s) + 7 * 24 * 3600 ))"

          {
            echo "normalized_title<<EOF"
            echo "${NORMALIZED_TITLE}"
            echo "EOF"
            echo "cid=${CID}"
            echo "voting_ends_at=${VOTING_ENDS_AT}"
          } >> "${GITHUB_OUTPUT}"

      - name: Install Stellar CLI
        if: steps.meta.outputs.eligible == 'true'
        uses: stellar/stellar-cli@v25.2.0

      - name: Configure Stellar CLI
        if: steps.meta.outputs.eligible == 'true'
        run: |
          echo "XDG_CONFIG_HOME=${RUNNER_TEMP}/xdg-config" >> "${GITHUB_ENV}"
          export XDG_CONFIG_HOME="${RUNNER_TEMP}/xdg-config"
          mkdir -p "${XDG_CONFIG_HOME}"
          stellar network add \
            --rpc-url "${STELLAR_RPC_URL}" \
            --network-passphrase "${STELLAR_NETWORK_PASSPHRASE}" \
            "${STELLAR_NETWORK_NAME}"
          printf '%s\n' "${STELLAR_SOURCE_SECRET}" | stellar keys add ci-submitter

      - name: Submit proposal to Tansu
        if: steps.meta.outputs.eligible == 'true'
        id: invoke
        env:
          PROJECT_KEY: ${{ inputs.project_key || vars.TANSU_PROJECT_KEY }}
          PROPOSAL_CID: ${{ steps.proposal.outputs.cid }}
          PROPOSAL_TITLE: ${{ steps.proposal.outputs.normalized_title }}
          VOTING_ENDS_AT: ${{ steps.proposal.outputs.voting_ends_at }}
        run: |
          set -euo pipefail

          RESULT="$(stellar contract invoke \
            --id "${TANSU_CONTRACT_ID}" \
            --source-account ci-submitter \
            --network "${STELLAR_NETWORK_NAME}" \
            -- \
            create_proposal \
            --proposer ci-submitter \
            --project_key "${PROJECT_KEY}" \
            --title "${PROPOSAL_TITLE}" \
            --ipfs "${PROPOSAL_CID}" \
            --voting_ends_at "${VOTING_ENDS_AT}" \
            --public_voting false)"

          {
            echo "result<<EOF"
            echo "${RESULT}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Write step summary
        if: steps.meta.outputs.eligible == 'true'
        run: |
          cat >> "${GITHUB_STEP_SUMMARY}" <<EOF
          ## Proposal Submission

          | | |
          | --- | --- |
          | **PR** | #${{ steps.meta.outputs.pr_number }} |
          | **Proposal file** | \`${{ steps.meta.outputs.proposal_file }}\` |
          | **Proposal title** | ${{ steps.proposal.outputs.normalized_title }} |
          | **IPFS CID** | \`${{ steps.proposal.outputs.cid }}\` |
          | **Voting ends at** | \`${{ steps.proposal.outputs.voting_ends_at }}\` |
          | **Network** | \`${{ env.STELLAR_NETWORK_NAME }}\` |
          | **Contract** | \`${{ env.TANSU_CONTRACT_ID }}\` |
          | **Project key** | \`${{ inputs.project_key || vars.TANSU_PROJECT_KEY }}\` |

          **Invoke result**

          \`\`\`text
          ${{ steps.invoke.outputs.result }}
          \`\`\`
          EOF
